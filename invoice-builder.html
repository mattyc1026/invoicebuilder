<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good & Handy — Invoice Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --accent: #c0763a;
    --mid: #4a5568;
    --light: #f7f8fa;
    --border: #d1d8e0;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: #eef0f4;
    color: #222;
    min-height: 100vh;
  }

  /* ── BUILDER UI ── */
  #builder {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .ui-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .ui-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--navy);
    letter-spacing: -.5px;
  }
  .ui-header h1 span { color: var(--accent); }
  .ui-header p {
    color: var(--mid);
    font-size: .9rem;
    margin-top: 4px;
  }

  .card {
    background: var(--white);
    border-radius: 10px;
    padding: 28px 32px;
    margin-bottom: 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
  }
  .card h2 {
    font-weight: 700;
    font-size: .68rem;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .form-row.full { grid-template-columns: 1fr; }
  .form-row:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 5px;
    letter-spacing: .03em;
  }

  input, textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .9rem;
    color: #222;
    background: #fafbfc;
    transition: border-color .2s;
    outline: none;
  }
  input:focus, textarea:focus {
    border-color: var(--navy);
    background: #fff;
  }
  input[readonly] { background: #f0f2f5; color: var(--mid); cursor: default; }
  textarea { resize: vertical; min-height: 72px; }

  /* Due date toggle */
  .due-wrap { position: relative; }
  .due-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: .68rem;
    font-weight: 700;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: .05em;
    text-transform: uppercase;
    user-select: none;
  }
  .due-toggle:hover { color: var(--navy); }

  /* LINE ITEMS */
  #line-items { margin-bottom: 10px; }

  .line-item {
    display: grid;
    grid-template-columns: 1fr 72px 100px 100px 34px;
    gap: 7px;
    align-items: center;
    margin-bottom: 7px;
    animation: slideIn .18s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(-5px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .line-item input { margin: 0; }

  .remove-btn {
    background: none;
    border: 1.5px solid #e0e4ea;
    border-radius: 6px;
    color: #bbb;
    cursor: pointer;
    font-size: 1rem;
    height: 36px;
    width: 34px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    padding: 0;
  }
  .remove-btn:hover { border-color: #e05b5b; color: #e05b5b; background: #fff5f5; }

  .line-item-header {
    display: grid;
    grid-template-columns: 1fr 72px 100px 100px 34px;
    gap: 7px;
    margin-bottom: 5px;
    padding-bottom: 6px;
    border-bottom: 1.5px solid var(--border);
  }
  .line-item-header span {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--mid);
  }

  .add-btn {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    color: var(--mid);
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    padding: 9px 16px;
    width: 100%;
    transition: all .15s;
    margin-top: 4px;
  }
  .add-btn:hover { border-color: var(--navy); color: var(--navy); background: #f5f7ff; }

  /* TOTALS */
  .totals-block {
    border-top: 1.5px solid var(--border);
    margin-top: 14px;
    padding-top: 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 7px;
  }
  .totals-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .totals-row label {
    font-size: .82rem;
    color: var(--mid);
    width: 90px;
    text-align: right;
    margin: 0;
    font-weight: 600;
  }
  .totals-row input {
    width: 130px;
    text-align: right;
    font-weight: 600;
    background: #f5f7fa;
  }
  .totals-row.grand label { color: var(--navy); font-weight: 700; font-size: .88rem; }
  .totals-row.grand input { font-size: 1rem; font-weight: 700; color: var(--navy); background: #eef1fb; border-color: #8a9cc7; }

  /* ACTION BUTTONS */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .btn-primary {
    flex: 1;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-primary:hover { background: #253561; }
  .btn-secondary {
    background: #fff;
    color: var(--navy);
    border: 1.5px solid var(--navy);
    border-radius: 8px;
    padding: 13px 20px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-secondary:hover { background: var(--light); }

  /* ── PREVIEW OVERLAY ── */
  #preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,15,30,.55);
    z-index: 100;
    overflow-y: auto;
    padding: 30px 20px 60px;
  }
  #preview-overlay.visible { display: block; }

  .preview-actions {
    max-width: 680px;
    margin: 0 auto 16px;
    display: flex;
    gap: 10px;
  }
  .preview-actions button {
    padding: 10px 22px;
    border-radius: 7px;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: .88rem;
    cursor: pointer;
    border: none;
    transition: all .15s;
  }
  #close-preview { background: #fff; color: #333; }
  #close-preview:hover { background: #eee; }
  #print-btn { background: var(--navy); color: #fff; }
  #print-btn:hover { background: #253561; }

  /* ── THE INVOICE ── */
  #invoice {
    max-width: 680px;
    margin: 0 auto;
    background: #fff;
    padding: 54px 62px 62px;
    font-family: 'Source Sans 3', sans-serif;
    color: #222;
    border-radius: 4px;
  }

  .inv-logo-block {
    text-align: center;
    margin-bottom: 30px;
  }
  .inv-logo-block .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--navy);
    letter-spacing: -1px;
  }
  .inv-logo-block .brand-name span { color: var(--accent); }
  .inv-logo-block .brand-sub {
    font-size: .6rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 3px;
  }

  .inv-title {
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
    color: #222;
    margin-bottom: 24px;
  }

  .inv-header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    gap: 20px;
  }
  .inv-header-row .bill-to { flex: 1; }
  .inv-header-row .inv-details { text-align: right; flex-shrink: 0; }
  .inv-block-label {
    font-size: .66rem;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .inv-bill-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 2px;
  }
  .inv-bill-lines {
    font-size: .83rem;
    color: #444;
    line-height: 1.65;
  }
  .inv-details table { border-collapse: collapse; }
  .inv-details td {
    font-size: .83rem;
    padding: 2px 0 2px 16px;
    color: #444;
  }
  .inv-details td:first-child {
    font-weight: 700;
    color: var(--navy);
    text-align: right;
    padding-left: 0;
  }

  .inv-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ITEMS TABLE */
  .inv-items {
    width: 100%;
    border-collapse: collapse;
    font-size: .875rem;
    margin-top: 4px;
  }
  .inv-items thead tr { border-bottom: 2px solid var(--navy); }
  .inv-items thead th {
    text-align: left;
    font-size: .66rem;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--mid);
    padding: 0 0 8px;
    font-weight: 700;
  }
  .inv-items thead th:not(:first-child) { text-align: right; }
  .inv-items tbody tr { border-bottom: 1px solid #eaeef3; }
  .inv-items tbody td {
    padding: 9px 0;
    color: #333;
    vertical-align: top;
  }
  .inv-items tbody td:not(:first-child) { text-align: right; }
  .inv-items .col-desc { width: 52%; }

  /* TOTALS */
  .inv-totals {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    margin-top: 10px;
  }
  .inv-totals-row {
    display: flex;
    min-width: 220px;
    justify-content: space-between;
    font-size: .875rem;
  }
  .inv-totals-row .tlabel { color: var(--mid); font-weight: 600; padding-right: 24px; }
  .inv-totals-row .tval   { font-weight: 600; }
  .inv-totals-row.grand {
    border-top: 2px solid var(--navy);
    margin-top: 7px;
    padding-top: 7px;
  }
  .inv-totals-row.grand .tlabel,
  .inv-totals-row.grand .tval {
    font-weight: 700;
    color: var(--navy);
    font-size: .975rem;
  }

  /* NOTES */
  .inv-section-label {
    font-weight: 700;
    font-size: .95rem;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .inv-notes { font-size: .85rem; color: #444; line-height: 1.65; }

  /* SIGNATURES */
  .inv-sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 10px;
  }
  .sig-col-label {
    font-size: .75rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 30px;
    letter-spacing: .02em;
  }
  .sig-line {
    border-top: 1.5px solid #999;
    padding-top: 5px;
    font-size: .75rem;
    color: var(--mid);
  }
  .sig-line + .sig-line { margin-top: 22px; }

  @media print {
    body { background: #fff; }
    #builder { display: none !important; }
    #preview-overlay {
      display: block !important;
      background: none !important;
      padding: 0 !important;
      position: static !important;
    }
    .preview-actions { display: none !important; }
    #invoice {
      box-shadow: none;
      border-radius: 0;
      padding: 32px 48px;
      max-width: 100%;
    }
  }
</style>
</head>
<body>

<!-- ══════════════ BUILDER ══════════════ -->
<div id="builder">
  <div class="ui-header">
    <h1>Good <span>&</span> Handy</h1>
    <p>Invoice Builder — fill in the details below, then preview &amp; print</p>
  </div>

  <!-- INVOICE META -->
  <div class="card">
    <h2>Invoice Details</h2>
    <div class="form-row">
      <div>
        <label>Invoice #</label>
        <input type="text" id="invoiceNum">
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="invoiceDate">
      </div>
    </div>
    <div class="form-row full">
      <div>
        <label>Due Date</label>
        <div class="due-wrap">
          <input type="text" id="dueDate" value="Upon Receipt">
          <span class="due-toggle" id="dueToggle" onclick="toggleDue()">Edit</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BILL TO -->
  <div class="card">
    <h2>Bill To</h2>
    <div class="form-row full">
      <div>
        <label>Client Name</label>
        <input type="text" id="clientName">
      </div>
    </div>
    <div class="form-row full">
      <div>
        <label>Address</label>
        <input type="text" id="clientAddress">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>City, State, ZIP</label>
        <input type="text" id="clientCity">
      </div>
      <div>
        <label>Phone / Email</label>
        <input type="text" id="clientContact">
      </div>
    </div>
  </div>

  <!-- LINE ITEMS -->
  <div class="card">
    <h2>Line Items</h2>
    <div class="line-item-header">
      <span>Description</span>
      <span style="text-align:right">Qty</span>
      <span style="text-align:right">Unit Price</span>
      <span style="text-align:right">Amount</span>
      <span></span>
    </div>
    <div id="line-items"></div>
    <button class="add-btn" onclick="addItem()">+ Add Line Item</button>

    <div class="totals-block">
      <div class="totals-row">
        <label>Subtotal</label>
        <input type="text" id="subtotal" readonly>
      </div>
      <div class="totals-row grand">
        <label>Total</label>
        <input type="text" id="grandTotal" readonly>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="card">
    <h2>Additional Notes</h2>
    <div class="form-row full">
      <textarea id="notes"></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="btn-secondary" onclick="clearAll()">Clear All</button>
    <button class="btn-primary" onclick="showPreview()">Preview &amp; Print Invoice</button>
  </div>
</div>

<!-- ══════════════ PREVIEW OVERLAY ══════════════ -->
<div id="preview-overlay">
  <div class="preview-actions">
    <button id="close-preview" onclick="hidePreview()">← Back to Editor</button>
    <button id="print-btn" onclick="window.print()">🖨 Print / Save as PDF</button>
  </div>
  <div id="invoice"></div>
</div>

<script>
let items = [];
let itemCounter = 0;
let dueIsDate = false;

// ── Init
(function() {
  const today = new Date();
  document.getElementById('invoiceDate').value = today.toISOString().split('T')[0];
  document.getElementById('invoiceNum').value = genInvoiceNum(today);
  addItem();
  recalc();
})();

function genInvoiceNum(d) {
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  const hr = String(d.getHours()).padStart(2,'0');
  const mn = String(d.getMinutes()).padStart(2,'0');
  return `INV-${yr}${mo}${dy}-${hr}${mn}`;
}

// ── Due date toggle
function toggleDue() {
  const field  = document.getElementById('dueDate');
  const toggle = document.getElementById('dueToggle');
  if (!dueIsDate) {
    field.type  = 'date';
    field.value = '';
    toggle.textContent = 'Upon Receipt';
    dueIsDate = true;
  } else {
    field.type  = 'text';
    field.value = 'Upon Receipt';
    toggle.textContent = 'Edit';
    dueIsDate = false;
  }
}

// ── Line items
function addItem() {
  items.push({ id: ++itemCounter, desc:'', qty:'', price:'', amount:0 });
  renderItems();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
  recalc();
}

function renderItems() {
  const container = document.getElementById('line-items');
  const focusId    = document.activeElement ? document.activeElement.dataset.id    : null;
  const focusField = document.activeElement ? document.activeElement.dataset.field : null;

  container.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'line-item';
    const amtDisplay = item.amount > 0
      ? '$' + item.amount.toLocaleString('en-US',{minimumFractionDigits:2})
      : '';
    div.innerHTML = `
      <input type="text"   data-id="${item.id}" data-field="desc"   value="${esc(item.desc||'')}"   oninput="updateItem(this)">
      <input type="number" data-id="${item.id}" data-field="qty"    value="${item.qty||''}"           oninput="updateItem(this)" style="text-align:right" min="0" step="any">
      <input type="number" data-id="${item.id}" data-field="price"  value="${item.price||''}"         oninput="updateItem(this)" style="text-align:right" min="0" step=".01">
      <input type="text"   data-id="${item.id}" data-field="amount" value="${amtDisplay}"             readonly style="text-align:right">
      <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">×</button>
    `;
    container.appendChild(div);
  });

  if (focusId && focusField) {
    const el = container.querySelector(`[data-id="${focusId}"][data-field="${focusField}"]`);
    if (el) el.focus();
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateItem(el) {
  const id   = +el.dataset.id;
  const field = el.dataset.field;
  const item  = items.find(i => i.id === id);
  if (!item) return;
  item[field] = el.value;
  if (field === 'qty' || field === 'price') {
    const qty   = parseFloat(item.qty)   || 0;
    const price = parseFloat(item.price) || 0;
    item.amount = qty * price;
    const amtEl = document.querySelector(`[data-id="${id}"][data-field="amount"]`);
    if (amtEl) amtEl.value = item.amount > 0
      ? '$' + item.amount.toLocaleString('en-US',{minimumFractionDigits:2})
      : '';
  }
  recalc();
}

function recalc() {
  const sub = items.reduce((s,i) => s + (i.amount||0), 0);
  const fmt = n => '$' + n.toLocaleString('en-US',{minimumFractionDigits:2});
  document.getElementById('subtotal').value  = fmt(sub);
  document.getElementById('grandTotal').value = fmt(sub);
}

function fmtMoney(n) {
  return '$' + parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2});
}
function fmtDate(str) {
  if (!str) return '';
  const p = str.split('-');
  if (p.length !== 3) return str;
  return `${p[1]}/${p[2]}/${p[0]}`;
}

// ── Preview
function showPreview() {
  const invoiceNum  = document.getElementById('invoiceNum').value;
  const invoiceDate = fmtDate(document.getElementById('invoiceDate').value);
  const dueDateRaw  = document.getElementById('dueDate').value;
  const dueDate     = dueIsDate ? fmtDate(dueDateRaw) : (dueDateRaw || 'Upon Receipt');
  const clientName  = document.getElementById('clientName').value;
  const clientAddr  = document.getElementById('clientAddress').value;
  const clientCity  = document.getElementById('clientCity').value;
  const clientCont  = document.getElementById('clientContact').value;
  const notes       = document.getElementById('notes').value;
  const subtotal    = items.reduce((s,i) => s + (i.amount||0), 0);

  let rowsHTML = '';
  items.forEach(item => {
    if (!item.desc && !item.price && !item.qty) return;
    const qty    = parseFloat(item.qty)   || 0;
    const price  = parseFloat(item.price) || 0;
    const amount = qty * price;
    rowsHTML += `
      <tr>
        <td class="col-desc">${item.desc || ''}</td>
        <td>${qty || ''}</td>
        <td>${price ? fmtMoney(price) : ''}</td>
        <td>${amount ? fmtMoney(amount) : ''}</td>
      </tr>`;
  });

  let billLines = '';
  if (clientAddr) billLines += `<div>${clientAddr}</div>`;
  if (clientCity) billLines += `<div>${clientCity}</div>`;
  if (clientCont) billLines += `<div>${clientCont}</div>`;

  document.getElementById('invoice').innerHTML = `
    <div class="inv-logo-block">
      <div class="brand-name">Good <span>&</span> Handy</div>
      <div class="brand-sub">Professional Handyman Services</div>
    </div>

    <div class="inv-title">Invoice</div>

    <div class="inv-header-row">
      <div class="bill-to">
        <div class="inv-block-label">Bill To</div>
        ${clientName ? `<div class="inv-bill-name">${clientName}</div>` : ''}
        <div class="inv-bill-lines">${billLines}</div>
      </div>
      <div class="inv-details">
        <table>
          <tr><td>Invoice #</td><td>${invoiceNum}</td></tr>
          <tr><td>Date</td><td>${invoiceDate}</td></tr>
          <tr><td>Due</td><td>${dueDate}</td></tr>
        </table>
      </div>
    </div>

    <hr class="inv-divider">

    <table class="inv-items">
      <thead>
        <tr>
          <th class="col-desc">Description</th>
          <th style="text-align:right">Qty</th>
          <th style="text-align:right">Unit Price</th>
          <th style="text-align:right">Amount</th>
        </tr>
      </thead>
      <tbody>${rowsHTML}</tbody>
    </table>

    <div class="inv-totals">
      <div class="inv-totals-row">
        <span class="tlabel">Subtotal</span>
        <span class="tval">${fmtMoney(subtotal)}</span>
      </div>
      <div class="inv-totals-row grand">
        <span class="tlabel">Total</span>
        <span class="tval">${fmtMoney(subtotal)}</span>
      </div>
    </div>

    ${notes ? `
    <hr class="inv-divider">
    <div class="inv-section-label">Additional Notes</div>
    <div class="inv-notes">${notes}</div>` : ''}

    <hr class="inv-divider">

    <div class="inv-section-label">Approval &amp; Acceptance</div>

    <div class="inv-sig-grid">
      <div>
        <div class="sig-col-label">Client</div>
        <div class="sig-line">Signature</div>
        <div class="sig-line">Date</div>
      </div>
      <div>
        <div class="sig-col-label">Contractor</div>
        <div class="sig-line">Signature</div>
        <div class="sig-line">Date</div>
      </div>
    </div>
  `;

  document.getElementById('preview-overlay').classList.add('visible');
  document.getElementById('preview-overlay').scrollTop = 0;
}

function hidePreview() {
  document.getElementById('preview-overlay').classList.remove('visible');
}

function clearAll() {
  if (!confirm('Clear all fields and start a new invoice?')) return;
  ['clientName','clientAddress','clientCity','clientContact','notes']
    .forEach(id => document.getElementById(id).value = '');

  const dd = document.getElementById('dueDate');
  dd.type = 'text';
  dd.value = 'Upon Receipt';
  document.getElementById('dueToggle').textContent = 'Edit';
  dueIsDate = false;

  const today = new Date();
  document.getElementById('invoiceDate').value = today.toISOString().split('T')[0];
  document.getElementById('invoiceNum').value = genInvoiceNum(today);

  items = []; itemCounter = 0;
  addItem();
  recalc();
}
</script>
</body>
</html>
